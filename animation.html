<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akash Academy Intro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.12), transparent 25%),
        radial-gradient(circle at 70% 70%, rgba(255,200,80,.12), transparent 28%),
        linear-gradient(135deg, #18001f 0%, #090012 70%);
    }
    .wrap {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      position: relative;
    }
    .glow {
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.10), transparent 35%),
        radial-gradient(circle at 25% 25%, rgba(130,70,255,.18), transparent 25%),
        radial-gradient(circle at 75% 75%, rgba(255,200,80,.12), transparent 24%);
      filter: blur(30px);
      animation: bgMove 6s ease-in-out infinite alternate;
    }
    .speech {
      position: absolute;
      top: 18%;
      background: rgba(255,255,255,.96);
      color: #222;
      padding: 14px 20px;
      border-radius: 16px;
      font-weight: 800;
      opacity: 0;
      transform: translateY(20px);
      transition: .5s ease;
      z-index: 5;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .speech.show {
      opacity: 1;
      transform: translateY(0);
    }
    .robot {
      width: 240px;
      height: 320px;
      position: relative;
      transform: translateY(130px) scale(0.55);
      opacity: 0;
      transition: 1s ease;
      z-index: 4;
    }
    .robot.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .head {
      width: 116px;
      height: 98px;
      background: linear-gradient(#d8e4f0, #9eb1c7);
      border: 5px solid #22314a;
      border-radius: 22px;
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
    }
    .eye {
      width: 15px;
      height: 15px;
      background: #00fff0;
      border-radius: 50%;
      position: absolute;
      top: 36px;
      box-shadow: 0 0 12px #00fff0;
    }
    .eye.left { left: 24px; }
    .eye.right { right: 24px; }
    .mouth {
      width: 42px;
      height: 8px;
      background: #22314a;
      border-radius: 6px;
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      transition: .15s ease;
    }
    .body {
      width: 150px;
      height: 132px;
      background: linear-gradient(#c7d5e3, #8ea3ba);
      border: 5px solid #22314a;
      border-radius: 26px;
      position: absolute;
      left: 50%;
      top: 106px;
      transform: translateX(-50%);
    }
    .arm {
      width: 22px;
      height: 92px;
      background: linear-gradient(#c7d5e3, #8ea3ba);
      border: 4px solid #22314a;
      border-radius: 10px;
      position: absolute;
      top: 112px;
      transform-origin: top center;
    }
    .arm.left { left: 18px; transform: rotate(10deg); }
    .arm.right { right: 18px; transform: rotate(-10deg); }
    .leg {
      width: 22px;
      height: 70px;
      background: linear-gradient(#c7d5e3, #8ea3ba);
      border: 4px solid #22314a;
      border-radius: 10px;
      position: absolute;
      bottom: 10px;
      transform-origin: top center;
    }
    .leg.left { left: 74px; }
    .leg.right { right: 74px; }

    .robot.talk .head { animation: talkHead .22s infinite alternate; }
    .robot.talk .mouth { animation: mouthTalk .18s infinite alternate; }
    .robot.talk .arm.left { animation: waveLeft .25s infinite alternate; }
    .robot.talk .arm.right { animation: waveRight .25s infinite alternate; }
    .robot.talk .body { animation: bodyTalk .28s infinite alternate; }

    .robot.exit { animation: robotExit 1s ease forwards; }

    @keyframes mouthTalk { from { height: 6px; width: 36px; } to { height: 14px; width: 50px; } }
    @keyframes talkHead { from { transform: translateX(-50%) rotate(-2deg); } to { transform: translateX(-50%) rotate(2deg); } }
    @keyframes waveLeft { from { transform: rotate(-18deg); } to { transform: rotate(26deg); } }
    @keyframes waveRight { from { transform: rotate(18deg); } to { transform: rotate(-26deg); } }
    @keyframes bodyTalk { from { transform: translateX(-50%) translateY(0); } to { transform: translateX(-50%) translateY(-4px); } }
    @keyframes robotExit { from { opacity: 1; transform: translateY(0) scale(1); } to { opacity: 0; transform: translateY(-20px) scale(0.7); } }
    @keyframes bgMove { from { transform: scale(1) translate3d(0,0,0); } to { transform: scale(1.05) translate3d(2%, -2%, 0); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="glow"></div>
    <div class="speech" id="speech">Hello, welcome to Aksh Academy, lets explore our world </div>
    <div class="robot" id="robot">
      <div class="head">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="mouth"></div>
      </div>
      <div class="body"></div>
      <div class="arm left"></div>
      <div class="arm right"></div>
      <div class="leg left"></div>
      <div class="leg right"></div>
    </div>
  </div>

  <script>
    const robot = document.getElementById("robot");
    const speechBox = document.getElementById("speech");

    function speak(text) {
      return new Promise((resolve) => {
        if (!("speechSynthesis" in window)) {
          resolve();
          return;
        }
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.rate = 0.95;
        u.pitch = 0.55;
        u.volume = 1;
        u.lang = "en-US";
        u.onend = resolve;
        u.onerror = resolve;
        window.speechSynthesis.speak(u);
      });
    }

    async function startIntro() {
      robot.classList.add("show");
      speechBox.classList.add("show");
      robot.classList.add("talk");

      await speak("Hello, welcome to  Aksh Academy, lets explore our world");

      setTimeout(() => {
        robot.classList.remove("talk");
        robot.classList.add("exit");
        speechBox.classList.add("exit");
      }, 400);

      setTimeout(() => {
        window.location.href = "home.html";
      }, 1400);
    }

    window.addEventListener("load", () => {
      setTimeout(startIntro, 300);
    });
  </script>
</body>
</html>
